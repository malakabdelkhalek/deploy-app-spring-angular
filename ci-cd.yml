name: CI/CD Spring Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # ETAPE 1 : Recuperer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # ETAPE 2 : Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ETAPE 3 : Build Backend
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot/app

      # ETAPE 4 : Push Backend
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # ETAPE 5 : Build Frontend
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      # ETAPE 6 : Push Frontend
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # ETAPE 7 : Lancer avec Docker Compose
      - name: Start app with Docker Compose
        run: docker-compose up -d

      # ETAPE 8 : Attendre que les services demarrent
      - name: Wait for services
        run: sleep 30

      # ETAPE 9 : Verifier les conteneurs
      - name: Check containers
        run: |
          docker-compose ps
          docker-compose logs --tail=20

      # ETAPE 10 : Arreter les conteneurs
      - name: Stop containers
        run: docker-compose down